<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pay securely — Globa Pay</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="page">
    <div class="phone" id="phone">

      <!-- Amount entry screen -->
      <div class="screen" id="payScreen">
        <div class="screen-top">
          <div class="top-bar">
            <div class="merchant">
              <div class="merchant-mark">G</div>
              <div class="merchant-copy">
                <span class="merchant-name">Cash App</span>
                <span class="merchant-sub">Checkout · Globa Pay</span>
              </div>
            </div>
            <div class="secure-badge">Secure</div>
          </div>

          <p class="amount-label">Enter amount</p>
          <div class="amount-row">
            <button class="amount-btn" id="minusBtn" type="button" aria-label="Decrease">−</button>
            <div class="amount-display" id="amountDisplay">$0</div>
            <button class="amount-btn" id="plusBtn" type="button" aria-label="Increase">+</button>
          </div>

          <div class="quick-amounts">
            <button class="chip" data-amount="10" type="button">$10</button>
            <button class="chip" data-amount="20" type="button">$20</button>
            <button class="chip" data-amount="50" type="button">$50</button>
            <button class="chip" data-amount="100" type="button">$100</button>
          </div>
        </div>

        <div class="screen-bottom">
          <div class="keypad" id="keypad">
            <button type="button" data-key="1">1</button>
            <button type="button" data-key="2">2</button>
            <button type="button" data-key="3">3</button>
            <button type="button" data-key="4">4</button>
            <button type="button" data-key="5">5</button>
            <button type="button" data-key="6">6</button>
            <button type="button" data-key="7">7</button>
            <button type="button" data-key="8">8</button>
            <button type="button" data-key="9">9</button>
            <button type="button" data-key=".">.</button>
            <button type="button" data-key="0">0</button>
            <button type="button" data-key="back" class="key-back" aria-label="Backspace">⌫</button>
          </div>

          <p class="error" id="error"></p>
          <button class="btn-pay" id="payBtn" type="button">Continue to Cash App</button>

          <div class="trust-row">
            <span>Encrypted checkout</span>
            <span>Live settlement</span>
          </div>
          <p class="footer-note">
            <span class="footer-icon">G</span>
            Secured by Globa Pay
          </p>
        </div>
      </div>

      <!-- Invoice / Cash App screen -->
      <div class="screen hidden" id="invoiceScreen">
        <div class="screen-top invoice-top">
          <button class="back-btn" id="backBtn" type="button">← Back</button>
          <div class="invoice-amount" id="displayAmount">$0.00</div>
          <div class="invoice-sats" id="displaySats"></div>
          <div class="expiry-timer" id="expiryTimer">Expires in 10:00</div>
        </div>

        <div class="screen-bottom invoice-bottom" id="invoiceBottom">
          <div class="qr-wrap" id="qrWrap"></div>

          <div class="status waiting" id="status">
            <span class="dot"></span>
            Waiting for payment...
          </div>

          <a class="btn-cashapp" id="cashAppBtn" href="#" onclick="openInCashApp(event)">
            <span class="cash-icon">$</span>
            Open in Cash App
          </a>
          <button class="btn-copy-invoice" id="copyInvoiceBtn" type="button">Copy Invoice</button>
          <p class="pay-hint" id="payHint">Scan with Cash App or tap Open in Cash App</p>

          <textarea id="invoiceText" class="hidden" readonly></textarea>
          <p class="footer-note invoice-foot">
            <span class="footer-icon">G</span>
            Payment protected by Globa Pay
          </p>
        </div>
      </div>

    </div>
  </div>

  <script src="/app.js?v=3"></script>
</body>
</html>
